# .github/workflows/ci.yml
# This workflow runs the primary CI pipeline for the Go project.
name: Go CI

# Controls when the workflow will run
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # Fast checks that can run in parallel
  checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Format Check
        run: |
          diff -u <(echo -n) <(gofmt -d .)

      # Use latest golangci-lint with optimized settings
      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          skip-cache: false
          skip-save-cache: false

  # Build and test on multiple platforms
  test:
    name: Test & Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # Build first to catch compile errors early
      - name: Go Build
        run: go build -v ./...

      # Run tests with optimized flags
      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      # The CLI is a nested module; the root ./... does not reach it, and
      # go.work (which links the local library) is gitignored, so recreate the
      # workspace here before building and testing the CLI module.
      - name: Test CLI module
        run: |
          go work init . ./cmd/things3
          go -C cmd/things3 build -v ./...
          go -C cmd/things3 test -v -race ./...

      # Upload coverage only from Ubuntu to avoid duplicate reports
      - name: Upload coverage reports
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false
          codecov_yml_path: ./.codecov.yml
          flags: unittests
          name: codecov-things3
