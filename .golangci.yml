version: "2"

linters:
  default: none
  enable:
    # Default tier
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Bug detection
    - bodyclose
    - errorlint
    - gosec
    - noctx
    - sqlclosecheck

    # Code quality
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - errname
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - godox
    - goprintffuncname
    - intrange
    - lll
    - misspell
    - nakedret
    - revive
    - testifylint
    - unconvert
    - unparam
    - whitespace

    # Modern Go
    - modernize
    - perfsprint
    - usestdlibvars

    # Complexity
    - gocognit

  settings:
    depguard:
      rules:
        blocked:
          deny:
            - pkg: "github.com/sirupsen/logrus"
              desc: Use log/slog or log stdlib instead.
            - pkg: "github.com/pkg/errors"
              desc: Use fmt.Errorf with %w or errors stdlib instead.
            - pkg: "github.com/instana/testify"
              desc: Use github.com/stretchr/testify instead.
            - pkg: "io/ioutil"
              desc: Deprecated since Go 1.16. Use io and os packages instead.
    dupl:
      threshold: 100
    funlen:
      lines: -1
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 3
      # Repeated literals in tests are the test data, not a missing constant. The
      # _test.go exclusion below cannot cover this: goconst counts occurrences
      # across the package but reports them against the non-test declaration.
      ignore-tests: true
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - singleCaseSwitch
        - exitAfterDefer
    gocognit:
      min-complexity: 30
    godox:
      keywords:
        - FIXME
    govet:
      enable:
        - nilness
        - shadow
    errorlint:
      asserts: false
    lll:
      line-length: 140
    misspell:
      locale: US
    revive:
      rules:
        - name: indent-error-flow
        - name: unexported-return
          disabled: true
        - name: unused-parameter
        - name: unused-receiver
          disabled: true

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - lll
          - goconst
      # version.go's init wires buildinfo/ldflags version data; intentionally allowed.
      - path: cmd/version\.go
        linters:
          - gochecknoinits
      # MCP tool handlers must take their input struct by value to satisfy the SDK's
      # ToolHandlerFor signature; the mirrored test helpers do the same.
      - path: internal/mcpserver/
        linters:
          - gocritic
        text: hugeParam

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/moond4rk/things3
